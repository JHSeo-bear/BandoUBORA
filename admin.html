    <style>
        body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7fa; -webkit-tap-highlight-color: transparent; }

        /* 관리자 전용 버튼 컨테이너 */
        .car-type-container { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-row { display: flex; gap: 10px; width: 100%; }
        .type-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; background: white; }
        .btn-normal { color: #1e2a5a; }

.btn-violation{

<body>
    <div class="container">
        <div class="instruction-text">차량번호를 입력해주세요</div>
        <input type="text" inputmode="numeric" placeholder="번호 4자리" id="carNumberInput" maxlength="4"
               oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);">
        <button class="search-btn" onclick="runSearch()">조회하기</button>
        <button class="history-btn" onclick="openHistory()">📊 조회 이력 확인하기</button>
        <div class="admin-tag">🔐 관리자 페이지 접속 중</div>
    </div>

    </div>

    <div id="customAlert" onclick="closeAlert()">
        <div id="alertBox" class="alert-content" onclick="event.stopPropagation()">
            <div id="resStatusTitle" class="res-status-title"></div>
            <div id="violationList" class="violation-list"></div>
            <div id="violationCountDisplay" class="violation-count-text"></div>
            
            <div id="resOrder" class="res-order"></div>
            <div id="resMsg" class="res-msg"></div>

            <button id="oitokBtn" class="oitok-run-btn" onclick="launchOitok()">오이천사 앱 바로 실행</button>

            <div class="car-type-container">
<div class="btn-row">
<button class="type-btn btn-normal" onclick="saveAndClose('일반차')">일반차</button>
<button class="type-btn btn-compact" onclick="saveAndClose('경차')">경차</button>
</div>

<div class="btn-row">
<button class="type-btn btn-ev" onclick="saveAndClose('일반(EV)')">⚡일반(EV)</button>
<button class="type-btn btn-ev" onclick="saveAndClose('경차(EV)')">⚡경차(EV)</button>
</div>

<button class="type-btn btn-violation" onclick="openViolPopup()">🚨 위반차량 현장등록</button>
            </div>
        </div>
    </div>

    <script>

let capturedImage = null;

const firebaseConfig = {
    apiKey: "AIzaSyAoqVfpF05YX7mu6HHvY7PkfnaQNnFtx3I",
    authDomain: "ocbandoubora-5fec2.firebaseapp.com",
    projectId: "ocbandoubora-5fec2",
    storageBucket: "ocbandoubora-5fec2.firebasestorage.app",
    messagingSenderId: "28808444983",
    appId: "1:28808444983:web:fe557f5e86af7fa518d3b2",
    measurementId: "G-HNHTBJR515"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db = firebase.firestore();

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRnQVSpOO0zyW60BV3qKNmnM5-s4AVyWwBpcxUpVhy57XdiWF9_BerhAQWlrL6MOI/exec";

        let carData = [], errorData = [], alertTimer = null;
        let currentSearchLog = {};
        const cleanText = (str) => String(str || "").replace(/[^0-9가-힣]/g, "");

const FORM_URL =
"https://docs.google.com/forms/d/e/1FAIpQLSfnYUZhNbAFiyuUg32tOp3ESmpRgWXFgygi81X3oNsywMQf-g/formResponse";
const HISTORY_URL = "https://docs.google.com/spreadsheets/d/1YKYEVnie2ub8Er8rB3LSEZmSqygxRbyDo01N15Ghtow/edit#gid=1541395460";
const ENTRY_IDS = {
    car_num: "entry.355647351",
    result_info: "entry.965336314",
    status: "entry.1489715394",
    status_info: "entry.2061658845",
    car_info: "entry.747005680",
    info: "entry.829304981"
};

        async function loadData() {
            try {
                const now = Date.now();
                const [carRes, errRes] = await Promise.all([fetch(`carDB.json?v=${now}`), fetch(`err.json?v=${now}`)]);
                carData = await carRes.json();
                errorData = errRes.ok ? await errRes.json() : [];
            } catch (err) { console.error("데이터 로드 실패"); }
        }
        loadData();

        function runSearch() {
            const inputVal = document.getElementById('carNumberInput').value;
            if(inputVal.length < 4) return;
            const matches = carData.filter(car => String(car.car_number_for).trim() === inputVal);
            if (matches.length > 1) showSelectionList(matches);
            else if (matches.length === 1) processSelection(matches[0]);
            else {
                const inputValClean = cleanText(inputVal);
                const violationMatches = errorData.filter(err => cleanText(err.차량번호).endsWith(inputValClean));
                const viol = violationMatches.length;
                let displayNum = inputVal;
                if(viol > 0) displayNum = violationMatches[violationMatches.length - 1].차량번호;

                currentSearchLog = { num: displayNum, info: "정보 없음", status: "❌ 미등록", regNum: "" };
                
                document.getElementById('resStatusTitle').innerText = viol > 0 ? "위반 이력 존재" : "미등록 차량";
                document.getElementById('violationList').innerHTML = `<div class="${viol > 0 ? 'violation-item' : 'no-violation-num'}">${displayNum}</div>`;
                document.getElementById('violationCountDisplay').innerText = viol > 0 ? `미등록 단속 [${viol}]회` : "";
                document.getElementById('resOrder').style.display = 'none';
                document.getElementById('resMsg').innerHTML = "방문차량정보 확인";
                document.getElementById('oitokBtn').style.display = 'block';

                showPopup("#FF3636", 15000);
            }
        }

        function processSelection(car) {
            const fullNum = car.car_number_all.trim();
            const dongHo = `${car.dong}동 ${car.ho}호`;
            currentSearchLog = { num: fullNum, info: dongHo, status: "✅ 등록차량", regNum: car.registration_number || "" };
            
            const family = carData.filter(c => c.dong === car.dong && c.ho === car.ho).sort((a,b) => a.registration_order - b.registration_order);
            const familyInfo = family.map(c => `[${c.registration_order}순위] ${c.car_number_all}`).join('<br>');
            const viol = errorData.filter(err => cleanText(err.차량번호) === cleanText(fullNum)).length;
            
            document.getElementById('resStatusTitle').innerText = "◐ 등록차량 ◑";
            document.getElementById('violationList').innerHTML = `<div class="violation-item">${fullNum}</div>`;
            document.getElementById('violationCountDisplay').innerText = `주차규정 위반횟수 [${viol}]회`;
            document.getElementById('violationCountDisplay').style.color = viol > 0 ? "#FFEB3B" : "white";
            
            document.getElementById('resOrder').style.display = 'block';
            document.getElementById('resOrder').innerText = `${dongHo} 등록현황`;
            document.getElementById('resMsg').innerHTML = familyInfo;
            document.getElementById('oitokBtn').style.display = 'none';

            let bgColor = (car.registration_order === 1) ? "#368AFF" : (car.registration_order === 3) ? "#FFBB00" : (car.registration_order === 4) ? "#FF00DD" : "#1DDB16";
            showPopup(bgColor, 15000);
        }

        function showPopup(bgColor, duration) {
            if(alertTimer) clearTimeout(alertTimer);
            document.getElementById('alertBox').style.backgroundColor = bgColor;
            document.getElementById('customAlert').style.display = 'flex';
            alertTimer = setTimeout(closeAlert, duration);
        }

function saveAndClose(type) {

    if (!currentSearchLog.num) {
        closeAlert();
        return;
    }

    const params = new URLSearchParams();

    params.append(ENTRY_IDS.car_num, currentSearchLog.num);
    params.append(ENTRY_IDS.result_info, currentSearchLog.info);
    params.append(ENTRY_IDS.status, currentSearchLog.status);
    params.append(ENTRY_IDS.car_info, currentSearchLog.regNum || "");

    /* 차량 종류 그대로 저장 */
    params.append(ENTRY_IDS.status_info, type);

    params.append(ENTRY_IDS.info, "");

    fetch(FORM_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: params
    });

    closeAlert();
}

        function openHistory() { window.open(HISTORY_URL, '_blank'); }
        function closeAlert() { if(alertTimer) clearTimeout(alertTimer); document.getElementById('customAlert').style.display = 'none'; document.getElementById('carNumberInput').value = ""; }
        function launchOitok() { location.href = `intent:#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=net.gntalk.parkingmanager;end`; }
        function showSelectionList(matches) {
            const listEl = document.getElementById('carList');
            listEl.innerHTML = '';
            matches.forEach(car => {
                const li = document.createElement('li');
                li.className = 'car-item';
                li.innerText = `${car.car_number_all} (${car.dong}동 ${car.ho}호)`;
                li.onclick = () => { document.getElementById('selectionBox').style.display = 'none'; processSelection(car); };
                listEl.appendChild(li);
            });
            document.getElementById('selectionBox').style.display = 'flex';
        }

function closeViolPopup(){

document.getElementById("violPopup").style.display="none";

}

function confirmCancel(){

if(confirm("취소하시겠습니까?")){

closeViolPopup();

}

}

async function saveViolation(){

const saveBtn = document.getElementById("saveBtn");
saveBtn.disabled = true;
saveBtn.innerText = "등록중입니다...";
document.getElementById("loadingOverlay").style.display="flex";

try{

const carNum = document.getElementById("violCarNum").value.trim();
const room = document.getElementById("violRoom").value.trim();
const type = document.getElementById("violType").value;
const floor = document.getElementById("violFloor").value;
const memo = document.getElementById("violMemo").value.trim();

const month = parseInt(document.getElementById("violMonth").value);
const day = parseInt(document.getElementById("violDay").value);
const time = document.getElementById("violTime").value;

if(!carNum){
alert("차량번호를 입력하세요.");
document.getElementById("loadingOverlay").style.display="none";
saveBtn.disabled=false;
saveBtn.innerText="등록";
return;
}

if(!month || !day){
alert("단속일시를 확인하세요.");
document.getElementById("loadingOverlay").style.display="none";
saveBtn.disabled=false;
saveBtn.innerText="등록";
return;
}

const carNumClean = carNum.replace(/\s/g,"");
const carKey = carNumClean.replace(/[^0-9]/g,"").slice(-4);

let hour=0;
let minute=0;

if(time){
const parts=time.split(":");
hour=parseInt(parts[0])||0;
minute=parseInt(parts[1])||0;
}

const year=new Date().getFullYear();
const violationDateObj=new Date(year,month-1,day,hour,minute);


/* 사진 업로드 */

let photoUrl = "";
let photoName = "";

if(!capturedImage){
alert("사진을 촬영해주세요.");
document.getElementById("loadingOverlay").style.display="none";
saveBtn.disabled=false;
saveBtn.innerText="등록";
return;
}

const uploadResult = await uploadPhotoToDrive(capturedImage, carNum);
photoUrl = uploadResult.url;
photoName = uploadResult.fileName;

/* Firestore 저장 */

await db.collection("violations").add({

carNum: carNum,
carNumSearch: carKey,
room: room,
type: type,
floor: floor,
memo: memo,

photoUrl: photoUrl,
photoName: photoName,

violationDate: firebase.firestore.Timestamp.fromDate(violationDateObj)

});

document.getElementById("loadingOverlay").style.display="none";
alert("위반 등록 완료");

closeViolPopup();
closeAlert();

}catch(e){

document.getElementById("loadingOverlay").style.display="none";

console.error(e);
alert("등록 실패");

}

saveBtn.disabled=false;
saveBtn.innerText="등록";

}

function openViolPopup() {

capturedImage = null;
document.getElementById("photoBtnText").innerText = "📷 사진 촬영";

    document.getElementById("violPopup").style.display = "flex";

    const carInput = document.getElementById("violCarNum");
    const roomInput = document.getElementById("violRoom");

    if (currentSearchLog.status === "❌ 미등록") {
        carInput.readOnly = false;
        carInput.value = "";
        carInput.placeholder = "차량번호 전체 입력";
        roomInput.value = "외부차량";
        roomInput.readOnly = true;
    } else {
        carInput.readOnly = true;
        carInput.value = currentSearchLog.num;
        carInput.placeholder = "";
        roomInput.value = currentSearchLog.info || "";
        roomInput.readOnly = true;
    }

    const now = new Date();   // ← 여기서 현재시간 가져옴
    document.getElementById("violMonth").value = now.getMonth() + 1;  // 월 자동 입력
    document.getElementById("violDay").value = now.getDate();         // 일 자동 입력

    const hours = String(now.getHours()).padStart(2, '0');            // 시
    const minutes = String(now.getMinutes()).padStart(2, '0');        // 분
    document.getElementById("violTime").value = hours + ":" + minutes; // 시간 자동 입력

    document.getElementById("violMemo").value = "현장등록";
}

async function fileToBase64(file){

return new Promise((resolve,reject)=>{

const img = new Image();
const reader = new FileReader();

reader.onload = function(e){
img.src = e.target.result;
};

img.onload = function(){

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const maxWidth = 900;

let width = img.width;
let height = img.height;

if(width > maxWidth){
height = height * (maxWidth / width);
width = maxWidth;
}

canvas.width = width;
canvas.height = height;

ctx.drawImage(img,0,0,width,height);

const compressed = canvas.toDataURL("image/jpeg",0.6);

const base64 = compressed.split(",")[1];

resolve(base64);

};

reader.onerror = reject;
reader.readAsDataURL(file);

});
}

async function uploadPhotoToDrive(file, carNum){

const base64 = await fileToBase64(file);

const fileName = carNum + "_" + Date.now() + ".jpg";

const params = new URLSearchParams();
params.append("fileName", fileName);
params.append("mimeType", "image/jpeg");
params.append("base64Data", base64);

const response = await fetch(APPS_SCRIPT_URL,{
method:"POST",
body:params
});

const result = await response.json();

if(!result.success){
throw new Error("드라이브 업로드 실패");
}

return {
url: result.url,
fileName: result.fileName
};

}

function takePhoto() {

const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";
input.capture = "environment";

input.onchange = function(e) {

const file = e.target.files[0];
if (!file) return;

capturedImage = file;

document.getElementById("photoBtnText").innerText = "✅ 촬영 완료";

alert("사진 촬영 완료");

};

input.click();

}

</script>
